<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberCorp — Internal Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0:      #0d1117;
      --bg-1:      #161b22;
      --bg-2:      #21262d;
      --border:    #30363d;
      --text-1:    #e6edf3;
      --text-2:    #8b949e;
      --red:       #f85149;
      --orange:    #e3b341;
      --green:     #3fb950;
      --blue:      #58a6ff;
      --purple:    #bc8cff;
    }

    body {
      background: var(--bg-0);
      color: var(--text-1);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header .logo {
      width: 30px; height: 30px;
      background: var(--red);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; letter-spacing: -1px;
    }
    .header .app-name { font-size: 15px; font-weight: 600; }
    .header .vuln-badge {
      margin-left: auto;
      background: rgba(248,81,73,.12);
      border: 1px solid rgba(248,81,73,.35);
      color: var(--red);
      font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .8px;
    }

    /* ── Main grid ───────────────────────────────────── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      overflow: hidden;
    }

    /* ── Login panel ────────────────────────────────── */
    .login-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      overflow-y: auto;
    }
    .login-card { width: 100%; max-width: 340px; }

    .login-card h2 { font-size: 21px; margin-bottom: 4px; }
    .login-card .subtitle {
      color: var(--text-2); font-size: 13px; line-height: 1.5;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text-1);
      padding: 9px 13px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--blue); }

    .btn-login {
      width: 100%; margin-top: 6px;
      background: var(--red); color: #fff;
      border: none; padding: 10px;
      border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { opacity: .85; }
    .btn-login .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }



    /* ── Debug panel ────────────────────────────────── */
    .debug-panel {
      background: var(--bg-1);
      padding: 28px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .debug-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-2);
    }
    .debug-header .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--red);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .debug-block-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text-2); margin-bottom: 7px;
    }

    .code-box {
      background: var(--bg-0);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 13px 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px; line-height: 1.65;
      word-break: break-all;
      min-height: 46px;
      color: var(--orange);
    }
    .code-box .kw   { color: var(--blue); }
    .code-box .str  { color: var(--green); }
    .code-box .inj  { color: var(--red); text-decoration: underline dotted; }

    .info-box {
      background: var(--bg-0);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 13px 15px;
      font-size: 13px;
      min-height: 46px;
    }

    /* Data table */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; font-family: 'Courier New', monospace;
    }
    th {
      background: var(--bg-2); color: var(--text-2);
      padding: 7px 12px; text-align: left;
      font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 7px 12px; border-bottom: 1px solid var(--border);
      color: var(--text-1);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(88,166,255,.04); }
    td.highlight { color: var(--red); font-weight: 600; }

    .placeholder { color: var(--text-2); font-style: italic; font-size: 13px; }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      background: var(--bg-1); border-top: 1px solid var(--border);
      padding: 9px 24px; font-size: 11px; color: var(--text-2);
      display: flex; justify-content: space-between;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">CC</div>
  <span class="app-name">CyberCorp — Internal Portal</span>
  <span class="vuln-badge">⚠ Vulnerable Demo</span>
</div>

<!-- Main -->
<div class="main">

  <!-- Left: Login form -->
  <div class="login-panel">
    <div class="login-card">
      <h2>Sign in</h2>
      <p class="subtitle">Access is restricted to authorised CyberCorp personnel only.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g.  admin" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="off" />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <div class="spinner"></div>
          <span id="btnText">Sign In</span>
        </button>
      </form>


    </div>
  </div>

  <!-- Right: Debug panel -->
  <div class="debug-panel">
    <div class="debug-header">
      <div class="dot"></div>
      SQL Debug Panel
    </div>

    <!-- Executed query -->
    <div class="debug-block">
      <div class="debug-block-label">Executed Query</div>
      <div class="code-box" id="dbQuery">
        <span class="placeholder">— submit the form to see the query —</span>
      </div>
    </div>

    <!-- Dumped data table -->
    <div class="debug-block" id="dbTableBlock" style="display:none;">
      <div class="debug-block-label">Dumped Data</div>
      <div class="info-box table-wrap" id="dbTable"></div>
    </div>


  </div>

</div>

<!-- Footer -->
<div class="footer">
  <span>CyberCorp Internal Portal v2.4.1 — Authentication Module</span>
  <span>webapp-vulns-demos · sql-injection POC</span>
</div>

<script>
  const SQL_KEYWORDS = ['SELECT','FROM','WHERE','AND','OR','UNION','ALL',
    'INSERT','UPDATE','DELETE','DROP','TABLE','INTO','VALUES','SLEEP',
    'INFORMATION_SCHEMA','NULL','IS','NOT','IN','LIKE','ORDER','BY','LIMIT'];

  function highlightSQL(raw) {
    // Escape HTML first
    let s = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // Highlight injected portion (everything after legitimate part, heuristic: starts with ')
    s = s.replace(/(&#39;|')(.*)/g, (m, q, rest) => `${q}<span class="inj">${rest}</span>`);

    // Keywords
    SQL_KEYWORDS.forEach(kw => {
      s = s.replace(new RegExp(`\\b(${kw})\\b`, 'gi'), `<span class="kw">$1</span>`);
    });
    return s;
  }

  function buildTable(rows) {
    if (!rows || rows.length === 0) return '';
    const cols = Object.keys(rows[0]);
    let html = '<table><thead><tr>';
    cols.forEach(c => { html += `<th>${c}</th>`; });
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr>';
      cols.forEach(c => {
        const sensitive = ['password','role','email'].includes(c);
        html += `<td class="${sensitive ? 'highlight' : ''}">${row[c] ?? ''}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  // ── Login handler ──────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');
    const btnText  = document.getElementById('btnText');

    // Loading state
    btn.classList.add('loading');
    btnText.textContent = 'Signing in…';

    try {
      const res  = await fetch('/api/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password }),
      });
      const data = await res.json();

      // Query box
      document.getElementById('dbQuery').innerHTML =
        data.query ? highlightSQL(data.query) : '<span class="placeholder">—</span>';

      // Data table
      const tableBlock = document.getElementById('dbTableBlock');
      if (data.data && data.data.length > 0) {
        document.getElementById('dbTable').innerHTML = buildTable(data.data);
        tableBlock.style.display = 'block';
      } else {
        tableBlock.style.display = 'none';
      }

    } catch (err) {
      document.getElementById('dbQuery').innerHTML =
        '<span style="color:var(--red)">Connection error — is the backend container running?</span>';
    } finally {
      btn.classList.remove('loading');
      btnText.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>

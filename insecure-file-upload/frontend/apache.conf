<VirtualHost *:80>
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass        /api/ http://webapp-vulns-insecure-file-upload-backend:5000/
    ProxyPassReverse /api/ http://webapp-vulns-insecure-file-upload-backend:5000/

    <Directory /var/www/html>
        AllowOverride None
        Require all granted
    </Directory>

    # uploads dir: PHP execution ON, directory listing ON
    <Directory /var/www/html/uploads>
        Options +Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    LimitRequestBody 10485760
</VirtualHost>

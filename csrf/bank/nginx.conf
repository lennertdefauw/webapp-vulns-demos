server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass         http://webapp-vulns-csrf-backend:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_pass_header  Set-Cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
